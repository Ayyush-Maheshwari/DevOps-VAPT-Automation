# Security Policies Configuration
# Define security rules and policies for automated scanning

---
version: "1.0"
last_updated: "2024-03-29"

# General Security Policies
general:
  enforce_https: true
  require_authentication: true
  enable_audit_logging: true
  auto_remediation: false
  notification_enabled: true

# Code Security Policies
code_security:
  # Static Application Security Testing (SAST)
  sast:
    enabled: true
    scan_on_commit: true
    scan_on_pr: true
    block_on_critical: true
    languages:
      - javascript
      - python
      - java
      - go
      - ruby
      - php
    rules:
      - no_hardcoded_secrets
      - no_sql_injection
      - no_xss_vulnerabilities
      - secure_cryptography
      - input_validation
      - authentication_checks
  
  # Secret Detection
  secret_detection:
    enabled: true
    patterns:
      - aws_access_key
      - github_token
      - private_keys
      - api_keys
      - database_credentials
      - jwt_tokens
    exclude_paths:
      - "*/test/*"
      - "*/tests/*"
      - "*.test.js"
      - "*.spec.js"
    fail_on_detection: true

# Dependency Security Policies
dependency_security:
  enabled: true
  check_frequency: daily
  auto_update_minor: false
  auto_update_patch: false
  
  allowed_licenses:
    - MIT
    - Apache-2.0
    - BSD-3-Clause
    - BSD-2-Clause
    - ISC
  
  blocked_licenses:
    - GPL-3.0
    - AGPL-3.0
  
  vulnerability_sources:
    - NVD
    - GitHub Advisory
    - npm Advisory
    - PyPI Advisory
    - OSS Index

# Container Security Policies
container_security:
  enabled: true
  base_images:
    allowed_registries:
      - docker.io
      - gcr.io
      - quay.io
    
    approved_bases:
      - ubuntu:22.04
      - alpine:3.18
      - node:18-alpine
      - python:3.11-slim
  
  scanning:
    scan_on_build: true
    scan_layers: true
    check_malware: true
    
  runtime_policies:
    no_root_user: true
    read_only_filesystem: true
    drop_capabilities: true
    network_policies: true

# Infrastructure Security
infrastructure:
  iac_scanning:
    enabled: true
    tools:
      - terraform
      - cloudformation
      - kubernetes
    
    checks:
      - no_public_access
      - encryption_enabled
      - logging_enabled
      - least_privilege
  
  secrets_management:
    use_vault: true
    rotate_secrets: true
    rotation_period_days: 90

# Compliance Requirements
compliance:
  frameworks:
    owasp_top_10:
      enabled: true
      version: "2021"
      mandatory: true
    
    cis_benchmarks:
      enabled: true
      level: 1
      mandatory: false
    
    pci_dss:
      enabled: false
      version: "4.0"
    
    gdpr:
      enabled: true
      data_protection: true
  
  reporting:
    generate_reports: true
    retention_days: 90
    export_formats:
      - html
      - json
      - pdf
      - xml

# Notification Settings
notifications:
  channels:
    email:
      enabled: true
      recipients:
        - security-team@company.com
        - devops-team@company.com
    
    slack:
      enabled: false
      webhook_url: ""
      channel: "#security-alerts"
    
    jira:
      enabled: false
      create_tickets: true
      project_key: "SEC"
  
  triggers:
    critical_vulnerability: true
    high_vulnerability: true
    secret_detected: true
    compliance_violation: true
    scan_failure: true

# Remediation Policies
remediation:
  auto_create_issues: true
  assign_to_owners: true
  sla_critical: "24 hours"
  sla_high: "7 days"
  sla_medium: "30 days"
  sla_low: "90 days"
  
  tracking:
    use_github_issues: true
    use_jira: false
    labels:
      - security
      - vulnerability
      - automated

# Exemptions and Suppressions
exemptions:
  allow_suppressions: true
  require_justification: true
  require_expiry_date: true
  require_approval: true
  approval_team:
    - security-lead
    - engineering-manager
  
  max_suppression_days: 90

# Audit and Logging
audit:
  log_all_scans: true
  log_policy_changes: true
  log_exemptions: true
  retention_days: 365
  
  export:
    enabled: true
    destination: "s3://security-logs/"
    format: "json"

# Integration Settings
integrations:
  ci_cd:
    github_actions: true
    gitlab_ci: true
    jenkins: true
    azure_devops: false
  
  security_tools:
    sonarqube: false
    snyk: false
    veracode: false
    checkmarx: false
  
  ticketing:
    jira: false
    servicenow: false
    github_issues: true
